<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>A-Frame</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

</head>

<body>

<a-scene background="color: #fff">

<a-assets>
<a-asset-item id="sceneModel" src="https://popova-veronika.github.io/TEST_VR.glb"></a-asset-item>
</a-assets>

<a-entity camera look-controls position="0 1.6 5"></a-entity>

<a-entity light="type: ambient; intensity: 1"></a-entity>
<a-entity light="type: directional; intensity: 1" position="0 2 0"></a-entity>

<a-entity
gltf-model="#sceneModel"
position="0 0 -0.35"
animation-mixer>
</a-entity>

<!-- pink -->
<a-entity light="type: point; color: #ff4fd8; intensity: 2; distance: 6; decay: 2" position="-0.28 -0.24 9.83"></a-entity>
<a-entity light="type: point; color: #ff4fd8; intensity: 2; distance: 6; decay: 2" position="2.20 -6.79 5.13"></a-entity>
<a-entity light="type: point; color: #ff4fd8; intensity: 2; distance: 6; decay: 2" position="2.13 -11.04 2.19"></a-entity>
<a-entity light="type: point; color: #ff4fd8; intensity: 2; distance: 6; decay: 2" position="-4.10 3.34 -0.93"></a-entity>

<!-- blue -->
<a-entity light="type: point; color: #4f7dff; intensity: 2; distance: 6; decay: 2" position="2 0.67 -5.42"></a-entity>
<a-entity light="type: point; color: #4f7dff; intensity: 1; distance: 6; decay: 2" position="1.66 -0.55 5.42"></a-entity>
<a-entity light="type: point; color: #4f7dff; intensity: 2; distance: 6; decay: 2" position="4.37 0.67 5.57"></a-entity>
<a-entity light="type: point; color: #4f7dff; intensity: 2; distance: 6; decay: 2" position="0.98 -6.47 2.98"></a-entity>

<!-- violet -->
<a-entity light="type: point; color: #9c4fff; intensity: 2; distance: 5; decay: 2" position="-3.81 2.94 -4.08"></a-entity>

</a-scene>

</body>
</html>
